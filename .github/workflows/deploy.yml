name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      data_json:
        description: '自定义 data.json 内容（留空则使用仓库中的文件）'
        required: false
        type: string
      is_base64:
        description: '输入内容是否为 Base64 编码'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write custom data.json
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.data_json != '' }}
        run: |
          if [ "${{ inputs.is_base64 }}" = "true" ]; then
            echo "${{ inputs.data_json }}" | base64 -d > frontend/public/data/data.json
          else
            echo '${{ inputs.data_json }}' > frontend/public/data/data.json
          fi

      - name: Validate data.json
        run: |
          node -e "
            const data = require('./frontend/public/data/data.json');
            if (!data.user && !data.activities) {
              console.error('Error: data.json must contain user or activities field');
              process.exit(1);
            }
            console.log('✅ data.json validated');
            console.log('   User:', data.user ? (data.user.username || data.user.display_name) : '(none)');
            console.log('   Activities:', data.activities ? data.activities.length : 0);
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          NODE_ENV: production
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
